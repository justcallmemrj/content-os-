    - name: "licensing / remotion"
      score: 3
      note: "free at current headcount; standing watch on hiring person #4"
    - name: "engine-maturity / hyperframes"
      score: 4
      note: "first-engine path (D-006); this run IS the step-8 binding run"
    - name: "engine-maturity / remotion"
      score: 1
      note: "SK-C2 builder binding does not exist until step 9 — a remotion verdict is an escalation, not a build"
    - name: "determinism-ops / hyperframes"
      score: 4
      note: "local headless-Chrome + FFmpeg loop proven on this machine"
    - name: "determinism-ops / remotion"
      score: 2
      note: "node/npm build chain unproven in this repo"
  rationale: >-
    HyperFrames 25 vs Remotion 10 across the six ratified factors, and no
    single factor favors Remotion. The piece is a one-off, silent,
    caption-led typographic reel — squarely the HyperFrames column of the
    matrix — on the D-006 first-engine roadmap, with Apache-2.0 licensing and
    a proven local render loop; Remotion additionally has no bound builder
    until step 9, so routing there would be an escalation by rule, not a
    build. The human/traditional lane was considered and rejected: the gap is
    unfilmed footage, not editing capability — handing the piece to a human
    editor supplies no asset the machine lacks. Hybrid buys nothing for a
    single-lane 90s piece. Scored before the verdict was stated.
  close_call: false
  override: null

